name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright Chromium (non-Linux)
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium

      - name: E2E smoke
        run: pnpm test:e2e

  rust:
    name: Rust (Tauri backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri's Linux build links against GTK and WebKit; the cargo check / clippy
      # path needs the dev headers even though we don't run a desktop binary in CI.
      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo fmt
        run: cd apps/desktop/src-tauri && cargo fmt --all -- --check

      - name: cargo clippy
        run: cd apps/desktop/src-tauri && cargo clippy --all-targets -- -D warnings

      - name: cargo test
        # The lib target carries all #[cfg(test)] modules; a plain `cargo test`
        # picks up zero because the bin doesn't have tests. Pin --lib to keep
        # the contract stable.
        run: cd apps/desktop/src-tauri && cargo test --lib
